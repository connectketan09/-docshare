{% extends 'vault/base.html' %}

{% block extra_css %}
<style>
    .processing-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 40px 20px;
        flex: 1;
        justify-content: center;
    }

    .loader-icon {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid var(--text-main);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 32px;
        position: relative;
    }

    .loader-icon::before {
        content: '';
        position: absolute;
        top: -8px;
        left: -8px;
        right: -8px;
        bottom: -8px;
        border-radius: 50%;
        border: 2px solid var(--secondary);
        border-right-color: transparent;
        border-bottom-color: transparent;
        animation: rotate 1.5s linear infinite;
    }

    @keyframes rotate {
        100% {
            transform: rotate(360deg);
        }
    }

    .loader-icon svg {
        width: 32px;
        height: 32px;
        fill: var(--text-main);
    }

    .status-title {
        font-size: 28px;
        font-weight: 800;
        color: var(--text-main);
        margin-bottom: 16px;
        line-height: 1.2;
    }

    .status-subtitle {
        font-size: 15px;
        color: var(--text-light);
        margin-bottom: 48px;
        max-width: 280px;
        line-height: 1.5;
    }

    .progress-container {
        width: 100%;
        margin-bottom: 16px;
    }

    .progress-bar-bg {
        width: 100%;
        height: 6px;
        background-color: #E8EAF1;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
    }

    .progress-bar-fill {
        height: 100%;
        width: 0%;
        background-color: var(--secondary);
        border-radius: 8px;
        transition: width 0.1s linear;
    }

    .progress-stats {
        display: flex;
        justify-content: space-between;
        width: 100%;
        margin-top: 12px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
    }

    .status-label {
        color: var(--secondary-dark);
        text-transform: uppercase;
    }

    .percentage {
        color: var(--text-main);
    }

    .encrypted-badge {
        margin-top: auto;
        padding-top: 40px;
    }
</style>
{% endblock %}

{% block content %}
<div class="processing-container">
    <div class="loader-icon">
        <svg viewBox="0 0 24 24">
            <path
                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
        </svg>
    </div>

    <h2 class="status-title">Securing your<br>document...</h2>
    <p class="status-subtitle">Encrypting your file and preparing the unique vault access key.</p>

    <div class="progress-container">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="progress-stats">
            <span class="status-label" id="statusLabel">AUTHENTICATING</span>
            <span class="percentage" id="percentageLabel">0%</span>
        </div>
    </div>

    <div class="encrypted-badge">
        <span class="badge" style="background-color: #F8F9FC; border: 1px solid #E8EAF1; color: var(--text-main);">
            <svg style="stroke:var(--secondary-dark); stroke-width: 2; fill: none; width:14px; height:14px;"
                viewBox="0 0 24 24">
                <path d="M16 8v-2a4 4 0 00-8 0v2M5 8h14v12a2 2 0 01-2 2H7a2 2 0 01-2-2V8z" />
            </svg>
            END-TO-END ENCRYPTED
        </span>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const progressBar = document.getElementById('progressBar');
        const percentageLabel = document.getElementById('percentageLabel');
        const statusLabel = document.getElementById('statusLabel');

        const vaultId = "{{ vault.vault_id }}";

        let progress = 0;
        let updateInterval = setInterval(() => {
            progress += Math.floor(Math.random() * 5) + 1;

            if (progress >= 100) {
                progress = 100;
                clearInterval(updateInterval);
                statusLabel.textContent = "DONE";

                setTimeout(() => {
                    const nextUrl = "{% url 'vault:qr_result' 'VAULT_ID' %}".replace('VAULT_ID', vaultId);
                    window.location.href = nextUrl;
                }, 500);
            }

            progressBar.style.width = `${progress}%`;
            percentageLabel.textContent = `${progress}%`;

            // Update labels based on progress
            if (progress > 30 && progress < 60) {
                statusLabel.textContent = "ENCRYPTING";
            } else if (progress >= 60 && progress < 90) {
                statusLabel.textContent = "GENERATING KEY";
            } else if (progress >= 90) {
                statusLabel.textContent = "FINALIZING";
            }

        }, 100);
    });
</script>
{% endblock %}
